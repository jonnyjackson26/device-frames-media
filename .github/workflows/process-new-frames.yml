name: process-frames

on:
  push:
    branches:
      - main
    paths:
      - "device-frames-raw/**"
      - "process_frames.py"
      - "frame_processor/**"
      - "requirements.txt"
      - ".github/workflows/process-new-frames.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  processing-new-frames:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect changed files in device-frames-raw
        id: changed
        run: |
          # Get list of changed files in device-frames-raw
          ADDED=$(git diff HEAD~1 HEAD --name-only --diff-filter=A -- device-frames-raw/ || echo "")
          MODIFIED=$(git diff HEAD~1 HEAD --name-only --diff-filter=M -- device-frames-raw/ || echo "")
          DELETED=$(git diff HEAD~1 HEAD --name-only --diff-filter=D -- device-frames-raw/ || echo "")

          # For renames: extract old names (deleted) and new names (to process) separately
          RENAMED_STATUS=$(git diff HEAD~1 HEAD --name-status --diff-filter=R -- device-frames-raw/ || echo "")
          RENAMED_OLD=$(echo "$RENAMED_STATUS" | awk '{print $2}' | grep -v '^$' || true)
          RENAMED_NEW=$(echo "$RENAMED_STATUS" | awk '{print $3}' | grep -v '^$' || true)

          ADDED=$(echo "$ADDED" | grep -v '^$' | sort -u || true)

          # Old renamed paths are effectively deleted outputs
          DELETED=$(printf '%s\n%s' "$DELETED" "$RENAMED_OLD" | grep -v '^$' | sort -u || true)

          CHANGED=$(printf '%s\n%s\n%s' "$ADDED" "$MODIFIED" "$RENAMED_NEW" | grep -v '^$' | sort -u || true)

          # Export as multiline output
          echo "changed<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "deleted<<EOF" >> $GITHUB_OUTPUT
          echo "$DELETED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "added<<EOF" >> $GITHUB_OUTPUT
          echo "$ADDED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "count=$(echo "$CHANGED" | wc -l)" >> $GITHUB_OUTPUT

      - name: Process changed frame assets and update README
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.changed }}
          DELETED_FILES: ${{ steps.changed.outputs.deleted }}
        run: python process_frames.py

      - name: Commit generated changes
        env:
          ADDED_FILES: ${{ steps.changed.outputs.added }}
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A device-frames-output/ README.md

          ADDED_FRAME_LINES=$(echo "$ADDED_FILES" \
            | grep -E '^device-frames-raw/.*\.png$' \
            | sed 's#^device-frames-raw/##' \
            | sed 's#\.png$##' \
            | sed 's#^#- #' \
            || true)

          ADDED_FRAME_TARGETS=$(echo "$ADDED_FILES" \
            | grep -E '^device-frames-raw/.*\.png$' \
            | sed 's#^device-frames-raw/##' \
            | awk -F'/' '
                NF >= 3 {
                  device = $1 " " $2
                  gsub(/[[:space:]]+/, " ", device)
                  print device
                }
              ' \
            | awk '!seen[tolower($0)]++' \
            || true)

          mapfile -t FRAME_TARGET_ARRAY <<< "$ADDED_FRAME_TARGETS"
          FRAME_TARGET_COUNT=0
          for target in "${FRAME_TARGET_ARRAY[@]}"; do
            if [ -n "$target" ]; then
              FRAME_TARGET_COUNT=$((FRAME_TARGET_COUNT + 1))
            fi
          done

          if [ "$FRAME_TARGET_COUNT" -eq 1 ]; then
            COMMIT_SUBJECT="chore: processed ${FRAME_TARGET_ARRAY[0]}"
          elif [ "$FRAME_TARGET_COUNT" -eq 2 ]; then
            COMMIT_SUBJECT="chore: processed ${FRAME_TARGET_ARRAY[0]} and ${FRAME_TARGET_ARRAY[1]}"
          elif [ "$FRAME_TARGET_COUNT" -gt 2 ]; then
            COMMIT_SUBJECT="chore: processed ${FRAME_TARGET_COUNT} device frames"
          else
            COMMIT_SUBJECT="chore: processed device frame assets"
          fi

          if [ -n "$ADDED_FRAME_LINES" ]; then
            COMMIT_BODY=$(printf "New frames added:\n%s" "$ADDED_FRAME_LINES")
          else
            COMMIT_BODY="No new raw frame files were added in this run."
          fi

          git commit -m "$COMMIT_SUBJECT" -m "$COMMIT_BODY"
          git push
